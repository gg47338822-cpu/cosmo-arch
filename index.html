// ===== DRILL DOWN =====
function setVisibility(){
  nodes.forEach(function(n){if(n.type==='sub')n.visible=false;else n.visible=true;});
  if(expandedNode&&expandedNode.children.length>0){
    expandedNode.children.forEach(function(ch){ch.visible=true;});
  }
  applyViewFilter();
}
function drillInto(node){
  if(!node.children||node.children.length===0)return false;
  drillStack.push(expandedNode);expandedNode=node;
  var count=node.children.length;
  node.children.forEach(function(ch,i){
    var angle=(Math.PI*2*i/count)-Math.PI/2;
    var dist=node.r*3.5+25;
    ch.ox=node.x+Math.cos(angle)*dist;ch.oy=node.y+Math.sin(angle)*dist;
    ch.x=node.x;ch.y=node.y;ch.pinned=false;
  });
  node.children.forEach(function(ch){
    var exists=edges.some(function(e){return(e.a===node&&e.b===ch)||(e.a===ch&&e.b===node);});
    if(!exists)E(node,ch,'',0.8);
  });
  setVisibility();selectedNode=node;
  targetCamX=-node.x*targetCamScale;targetCamY=-node.y*targetCamScale;
  targetCamScale=Math.min(1.8,W<768?1.2:1.5);
  updateBreadcrumb();return true;
}
function drillOut(){
  if(!expandedNode&&drillStack.length===0)return;
  expandedNode=drillStack.pop()||null;selectedNode=expandedNode;
  setVisibility();
  if(expandedNode){targetCamX=-expandedNode.x*targetCamScale;targetCamY=-expandedNode.y*targetCamScale;}
  else{targetCamX=0;targetCamY=0;targetCamScale=W<768?0.55:0.8;selectedNode=null;}
  updateBreadcrumb();
}
function updateBreadcrumb(){
  var el=document.getElementById('breadcrumb');while(el.firstChild)el.removeChild(el.firstChild);
  var root=document.createElement('span');root.className='bc-item'+(expandedNode?'':' active');root.textContent='COSMO';
  root.onclick=function(){expandedNode=null;drillStack=[];selectedNode=null;setVisibility();targetCamX=0;targetCamY=0;targetCamScale=W<768?0.55:0.8;updateBreadcrumb();};
  el.appendChild(root);
  var path=drillStack.filter(function(x){return x;}).concat(expandedNode?[expandedNode]:[]);
  path.forEach(function(n,i){
    var sep=document.createElement('span');sep.className='bc-sep';sep.textContent=' > ';el.appendChild(sep);
    var item=document.createElement('span');item.className='bc-item'+(i===path.length-1?' active':'');item.textContent=n.label;
    item.onclick=function(){var idx=drillStack.indexOf(n);if(idx>=0){drillStack=drillStack.slice(0,idx);expandedNode=n;}selectedNode=n;setVisibility();targetCamX=-n.x*targetCamScale;targetCamY=-n.y*targetCamScale;updateBreadcrumb();};
    el.appendChild(item);
  });
}
var currentView='full';
function applyViewFilter(){
  nodes.forEach(function(n){
    if(n.type==='sub'&&(!expandedNode||n.parent!==expandedNode)){n.visible=false;return;}
    switch(currentView){
      case'full':break;
      case'sim':if(n.group!=='sim'&&n.type!=='service'&&n.type!=='sub')n.visible=false;break;
      case'sp':if(n.group!=='sp'&&n.group!=='supply'&&n.type!=='service'&&n.type!=='sub')n.visible=false;break;
      case'web':if(n.group!=='web'&&n.type!=='service'&&n.type!=='sub')n.visible=false;break;
      case'flow':if(n.type!=='service'&&n.type!=='resource'&&n.type!=='external')n.visible=false;break;
    }
  });
}

// ===== PHYSICS: pinned nodes stay put =====
function simulate(){
  for(var i=0;i<nodes.length;i++){
    var ni=nodes[i];if(!ni.visible||ni.dragging||ni.pinned)continue;
    var fx=0,fy=0;
    fx-=ni.x*0.0008;fy-=ni.y*0.0008;
    for(var j=0;j<nodes.length;j++){
      if(i===j||!nodes[j].visible)continue;
      var nj=nodes[j],dx=ni.x-nj.x,dy=ni.y-nj.y,dist=Math.sqrt(dx*dx+dy*dy)+1;
      var force=500*(ni.r+nj.r)/(dist*dist);
      fx+=(dx/dist)*force;fy+=(dy/dist)*force;
    }
    fx+=(ni.ox-ni.x)*0.03;fy+=(ni.oy-ni.y)*0.03;
    ni.vx=(ni.vx+fx)*0.8;ni.vy=(ni.vy+fy)*0.8;ni.x+=ni.vx;ni.y+=ni.vy;
  }
}

// Wrap text for tooltip
function wrapText(text,maxW){
  var words=text.split('');var lines=[];var line='';
  for(var i=0;i<text.length;i++){
    line+=text[i];
    var m=ctx.measureText(line);
    if(m.width>maxW&&line.length>1){
      // Find last good break point
      var breakAt=line.length-1;
      for(var b=line.length-1;b>0;b--){
        var c=line[b];
        if(c===' '||c==='。'||c==='，'||c==='、'||c==='/'||c==='+'||c==='-'||c==='('||c===')'||c==='|'){breakAt=b+1;break;}
      }
      lines.push(line.substring(0,breakAt));
      line=line.substring(breakAt);
    }
  }
  if(line)lines.push(line);
  return lines;
}

function draw(){
  time+=0.016;simulate();
  camX+=(targetCamX-camX)*0.1;camY+=(targetCamY-camY)*0.1;camScale+=(targetCamScale-camScale)*0.1;
  ctx.clearRect(0,0,W,H);

  // Particles
  ctx.save();
  for(var i=0;i<40;i++){
    var px=((i*137.5+time*5)%(W+100))-50,py=((i*97.3+time*2)%(H+100))-50;
    ctx.fillStyle='rgba(196,185,154,'+(0.02+Math.sin(time+i)*0.015)+')';ctx.fillRect(px,py,1.5,1.5);
  }
  ctx.restore();

  ctx.save();ctx.translate(W/2+camX,H/2+camY);ctx.scale(camScale,camScale);

  // Determine highlight state: selectedNode takes priority over hoveredNode
  var focusNode=selectedNode||hoveredNode;

  // Edges
  edges.forEach(function(e){
    if(!e.a.visible||!e.b.visible)return;
    var isHL=focusNode&&(e.a===focusNode||e.b===focusNode);
    var alpha=focusNode?(isHL?0.7:0.05):0.2;
    ctx.beginPath();ctx.moveTo(e.a.x,e.a.y);ctx.lineTo(e.b.x,e.b.y);
    ctx.strokeStyle=isHL?CC.vermillion:hexRgba(CC.bamboo,alpha);
    ctx.lineWidth=isHL?e.width+1.5:e.width;ctx.stroke();
    if(e.animated||isHL){
      var t1=(time*0.4)%1,ddx=e.b.x-e.a.x,ddy=e.b.y-e.a.y;
      ctx.beginPath();ctx.arc(e.a.x+ddx*t1,e.a.y+ddy*t1,3,0,Math.PI*2);ctx.fillStyle=CC.vermillion;ctx.fill();
      var t2=(time*0.4+0.5)%1;ctx.beginPath();ctx.arc(e.a.x+ddx*t2,e.a.y+ddy*t2,2,0,Math.PI*2);ctx.fillStyle=hexRgba(CC.vermillion,0.4);ctx.fill();
    }
    if(e.label&&(isHL||!focusNode)){ctx.font='9px "Noto Sans SC",sans-serif';ctx.fillStyle=isHL?CC.vermillion:hexRgba(CC.bamboo,0.5);ctx.textAlign='center';ctx.fillText(e.label,(e.a.x+e.b.x)/2,(e.a.y+e.b.y)/2-6);}
  });

  // Nodes
  nodes.forEach(function(n){
    if(!n.visible)return;
    var isSel=n===selectedNode;
    var isHov=n===hoveredNode;
    var isConn=focusNode&&edges.some(function(e){return(e.a===focusNode&&e.b===n)||(e.b===focusNode&&e.a===n);});
    var dimmed=focusNode&&!isSel&&!isHov&&!isConn;
    var alpha=dimmed?0.1:1;
    var col=GCOL[n.group]||CC.stone;

    // Glow for selected/service/hovered
    if((isSel||isHov||n.type==='service')&&!dimmed){
      var glowR=isSel?n.r*3.2:n.r*2.5;
      var glowA=isSel?0.3:0.15;
      var grd=ctx.createRadialGradient(n.x,n.y,n.r*0.3,n.x,n.y,glowR);
      grd.addColorStop(0,hexRgba(col,glowA));grd.addColorStop(1,hexRgba(col,0));
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(n.x,n.y,glowR,0,Math.PI*2);ctx.fill();
    }

    // Circle
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    var fillA=isSel?0.25:(n.type==='service'?0.12:n.type==='sub'?0.15:0.08);
    ctx.fillStyle=hexRgba(col,fillA*alpha);ctx.fill();
    var strokeA=isSel?1:(isHov?0.9:0.5);
    ctx.strokeStyle=hexRgba(col,strokeA*alpha);
    ctx.lineWidth=isSel?3:(n.type==='service'?2:(isHov?2:1));ctx.stroke();

    // Selected: bright outer ring
    if(isSel){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+6,0,Math.PI*2);
      ctx.strokeStyle=hexRgba(col,0.6);ctx.lineWidth=2;ctx.stroke();
    }

    // Expandable indicator
    if(n.children&&n.children.length>0&&!dimmed&&n.type!=='service'){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+5,0,Math.PI*2);
      ctx.setLineDash([3,3]);ctx.strokeStyle=hexRgba(col,0.3);ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
    }

    // Service pulse
    if(n.type==='service'&&!dimmed){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+4,0,Math.PI*2);ctx.strokeStyle=hexRgba(col,0.2);ctx.lineWidth=1;ctx.stroke();
      var pulse=(Math.sin(time*1.8+n.id)+1)*0.5;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+8+pulse*8,0,Math.PI*2);ctx.strokeStyle=hexRgba(col,0.08*(1-pulse));ctx.lineWidth=1;ctx.stroke();
    }

    // Pinned indicator
    if(n.pinned&&!dimmed){
      ctx.beginPath();ctx.arc(n.x,n.y-n.r-4,2.5,0,Math.PI*2);
      ctx.fillStyle=hexRgba(CC.vermillion,0.6);ctx.fill();
    }

    // Center dot
    ctx.beginPath();ctx.arc(n.x,n.y,n.type==='service'?4:n.type==='sub'?2:2.5,0,Math.PI*2);
    ctx.fillStyle=hexRgba(col,0.8*alpha);ctx.fill();

    // Label
    var fs=n.type==='service'?13:n.type==='sub'?9:10;
    ctx.font=(n.type==='service'?'700 ':'400 ')+fs+'px "Noto Sans SC",sans-serif';
    ctx.textAlign='center';
    ctx.fillStyle=hexRgba(CC.ricePaper,(isSel||isHov?1:0.75)*alpha);
    ctx.fillText(n.label,n.x,n.y+n.r+12+(n.type==='sub'?-2:0));

    if(n.type==='service'&&!dimmed){
      ctx.font='500 9px "Cormorant Garamond",serif';ctx.fillStyle=hexRgba(col,0.6);
      var pm=n.title.match(/Port \d+/);if(pm)ctx.fillText(pm[0],n.x,n.y+n.r+24);
    }
  });

  // ===== TOOLTIP CARD drawn on canvas next to selected node =====
  if(selectedNode&&selectedNode.visible){
    var sn=selectedNode;
    var col=GCOL[sn.group]||CC.stone;
    var tipW=220,tipPad=12,lineH=14;

    // Determine position: right side preferred, flip if off screen
    var tipX=sn.x+sn.r+16;
    var tipY=sn.y-40;

    // Measure content
    ctx.font='bold 12px "Noto Sans SC",sans-serif';
    var titleLines=wrapText(sn.title,tipW-tipPad*2);
    ctx.font='10px "Noto Sans SC",sans-serif';
    var descLines=wrapText(sn.desc,tipW-tipPad*2);
    var tagH=sn.tags.length>0?22:0;
    var tipH=tipPad+titleLines.length*16+6+descLines.length*lineH+tagH+tipPad;

    // Background
    ctx.fillStyle='rgba(35,35,35,0.92)';
    roundRect(ctx,tipX,tipY,tipW,tipH,8);ctx.fill();
    ctx.strokeStyle=hexRgba(col,0.4);ctx.lineWidth=1;
    roundRect(ctx,tipX,tipY,tipW,tipH,8);ctx.stroke();

    // Accent top bar
    ctx.fillStyle=hexRgba(col,0.8);
    ctx.fillRect(tipX+1,tipY+1,tipW-2,3);

    // Title
    ctx.font='bold 12px "Noto Sans SC",sans-serif';ctx.textAlign='left';
    ctx.fillStyle=hexRgba(col,1);
    titleLines.forEach(function(l,i){ctx.fillText(l,tipX+tipPad,tipY+tipPad+14+i*16);});

    // Desc
    ctx.font='10px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(200,200,200,0.85)';
    var descY=tipY+tipPad+titleLines.length*16+6;
    descLines.forEach(function(l,i){ctx.fillText(l,tipX+tipPad,descY+12+i*lineH);});

    // Tags
    if(sn.tags.length>0){
      var tagY=descY+descLines.length*lineH+8;
      var tagX=tipX+tipPad;
      ctx.font='9px "Noto Sans SC",sans-serif';
      sn.tags.forEach(function(t){
        var tw=ctx.measureText(t).width+10;
        if(tagX+tw>tipX+tipW-tipPad){tagX=tipX+tipPad;tagY+=16;}
        ctx.fillStyle=hexRgba(col,0.12);
        roundRect(ctx,tagX,tagY,tw,14,4);ctx.fill();
        ctx.fillStyle=hexRgba(col,0.8);ctx.textAlign='left';
        ctx.fillText(t,tagX+5,tagY+10);
        tagX+=tw+4;
      });
    }

    // Connector line from node to tooltip
    ctx.beginPath();ctx.moveTo(sn.x+sn.r+2,sn.y);ctx.lineTo(tipX,tipY+tipH/2);
    ctx.strokeStyle=hexRgba(col,0.3);ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
  }

  ctx.restore();
  requestAnimationFrame(draw);
}

function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

// ===== INTERACTION =====
var dragNode=null,isDragging=false,lastTouch=null,pinchDist=null,dragStartTime=0;
function s2w(sx,sy){return{x:(sx-W/2-camX)/camScale,y:(sy-H/2-camY)/camScale};}
function findNode(sx,sy){
  var p=s2w(sx,sy),best=null,bestD=1e9;
  nodes.forEach(function(n){if(!n.visible)return;var d=Math.sqrt((n.x-p.x)*(n.x-p.x)+(n.y-p.y)*(n.y-p.y));if(d<n.r+12&&d<bestD){best=n;bestD=d;}});
  return best;
}

canvas.addEventListener('pointerdown',function(e){
  var n=findNode(e.clientX,e.clientY);
  if(n){dragNode=n;n.dragging=true;isDragging=false;dragStartTime=Date.now();}
  else{lastTouch={x:e.clientX,y:e.clientY};isDragging=false;dragStartTime=Date.now();}
  document.getElementById('hint').style.opacity='0';
});

canvas.addEventListener('pointermove',function(e){
  if(dragNode){
    var p=s2w(e.clientX,e.clientY);dragNode.x=p.x;dragNode.y=p.y;isDragging=true;
  }else if(lastTouch){
    var dx=e.clientX-lastTouch.x,dy=e.clientY-lastTouch.y;
    if(Math.abs(dx)>3||Math.abs(dy)>3)isDragging=true;
    targetCamX+=dx;targetCamY+=dy;
    lastTouch={x:e.clientX,y:e.clientY};
  }else{
    hoveredNode=findNode(e.clientX,e.clientY);
    canvas.style.cursor=hoveredNode?'pointer':'default';
  }
});

canvas.addEventListener('pointerup',function(e){
  if(dragNode){
    if(isDragging){
      // Dragged: pin the node in place
      dragNode.ox=dragNode.x;dragNode.oy=dragNode.y;dragNode.pinned=true;
    }else{
      // Tapped: drill down or select
      if(selectedNode===dragNode){
        // Already selected: try drill, if leaf show tooltip only
        if(!drillInto(dragNode)){/* already showing tooltip */}
      }else{
        // Select it, show tooltip
        selectedNode=dragNode;
        // If it has children, also drill
        if(dragNode.children&&dragNode.children.length>0){
          drillInto(dragNode);
        }
      }
    }
    dragNode.dragging=false;
  }else if(!isDragging&&lastTouch){
    // Tapped empty space
    var n=findNode(e.clientX,e.clientY);
    if(!n){
      if(expandedNode){drillOut();}
      else{selectedNode=null;}
    }
  }
  dragNode=null;lastTouch=null;
});

canvas.addEventListener('wheel',function(e){e.preventDefault();targetCamScale=Math.max(0.3,Math.min(3,targetCamScale*(e.deltaY>0?0.9:1.1)));},{passive:false});
canvas.addEventListener('touchstart',function(e){if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinchDist=Math.sqrt(dx*dx+dy*dy);}},{passive:true});
canvas.addEventListener('touchmove',function(e){if(e.touches.length===2&&pinchDist){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);targetCamScale=Math.max(0.3,Math.min(3,targetCamScale*d/pinchDist));pinchDist=d;}},{passive:true});
canvas.addEventListener('touchend',function(){pinchDist=null;});

document.querySelectorAll('.view-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.view-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');currentView=btn.dataset.view;
    expandedNode=null;drillStack=[];selectedNode=null;
    // Reset all pins
    nodes.forEach(function(n){n.pinned=false;n.ox=n.x;n.oy=n.y;});
    setVisibility();updateBreadcrumb();
    targetCamX=0;targetCamY=0;
    if(currentView==='sim')targetCamY=80;if(currentView==='web')targetCamY=-80;
    targetCamScale=currentView==='full'?0.8:1;
  });
});

if(W<768){targetCamScale=0.55;camScale=0.55;}else{targetCamScale=0.8;camScale=0.8;}
setVisibility();updateBreadcrumb();draw();
</script>
