canvas{display:block}

.logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;letter-spacing:8px;color:#C23A2E}

.view-btns{display:flex;gap:6px}

.view-btn.active,.view-btn:hover{background:rgba(194,58,46,0.08);border-color:#C23A2E;color:#C23A2E}
.panel{position:fixed;bottom:0;left:0;right:0;background:rgba(245,243,238,0.97);backdrop-filter:blur(20px);border-top:2px solid #C23A2E;padding:20px;z-index:30;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);max-height:50vh;overflow-y:auto;border-radius:20px 20px 0 0;color:#2C2C2C}
.panel.show{transform:translateY(0)}
.panel-handle{width:40px;height:4px;border-radius:2px;background:#C4B99A;margin:0 auto 16px}
.panel h3{font-size:1.1rem;color:#C23A2E;font-family:'Noto Serif SC',serif;margin-bottom:4px}
.panel .panel-type{font-size:0.7rem;color:#527261;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.panel p{font-size:0.85rem;line-height:1.8;color:#4A4A4A}
.panel .tags-area{margin-top:10px}
.panel .tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:0.65rem;margin:2px;background:rgba(82,114,97,0.1);color:#527261;border:1px solid rgba(82,114,97,0.2)}
.panel-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#6B6660;font-size:1.2rem;cursor:pointer}
.hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:0.7rem;color:rgba(196,185,154,0.6);z-index:10;pointer-events:none;transition:opacity 0.5s}
.hud-stats{position:fixed;top:60px;right:20px;z-index:20;text-align:right;pointer-events:none}
.hud-stat{font-size:0.65rem;color:#6B6660;margin-bottom:4px}
.hud-stat span{color:#C23A2E;font-weight:700;font-size:0.8rem;font-family:'Cormorant Garamond',serif}
.legend{position:fixed;bottom:20px;left:20px;z-index:20;pointer-events:none}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:0.65rem;color:#C4B99A}
.legend-dot{width:8px;height:8px;border-radius:50%}
.breadcrumb{position:fixed;top:56px;left:20px;z-index:20;display:flex;align-items:center;gap:4px;font-size:0.75rem;pointer-events:auto}
.bc-item{color:#6B6660;cursor:pointer;transition:color 0.2s}
.bc-item:hover,.bc-item.active{color:#C23A2E}
.bc-sep{color:#4A4A4A;font-size:0.6rem}
</style>
</head>

// ===== DRILL DOWN LOGIC =====
function setVisibility(){
  // Default: hide all L3 (sub) nodes
  nodes.forEach(function(n){
    if(n.type==='sub') n.visible=false;
    else n.visible=true;
  });
  // If drilled into a module, show its children, hide siblings' details
  if(expandedNode && expandedNode.children.length>0){
    // Show children
    expandedNode.children.forEach(function(ch){ch.visible=true;});
  }
  // Apply view filter on top
  applyViewFilter();
}

function drillInto(node){
  if(!node.children || node.children.length===0) return false;
  drillStack.push(expandedNode);
  expandedNode=node;
  // Position children around parent
  var count=node.children.length;
  node.children.forEach(function(ch,i){
    var angle=(Math.PI*2*i/count) - Math.PI/2;
    var dist=node.r*3.5+20;
    ch.ox=node.x+Math.cos(angle)*dist;
    ch.oy=node.y+Math.sin(angle)*dist;
    ch.x=node.x; ch.y=node.y; // animate from center
  });
  // Auto-add edges between parent and children if not exist
  node.children.forEach(function(ch){
    var exists=edges.some(function(e){return(e.a===node&&e.b===ch)||(e.a===ch&&e.b===node);});
    if(!exists) E(node,ch,'',0.8);
  });
  setVisibility();
  // Zoom to node
  targetCamX=-node.x*targetCamScale;
  targetCamY=-node.y*targetCamScale;
  targetCamScale=Math.min(1.8, W<768?1.2:1.5);
  updateBreadcrumb();
  return true;
}

function drillOut(){
  if(drillStack.length===0 && !expandedNode) return;
  expandedNode=drillStack.pop()||null;
  setVisibility();
  if(expandedNode){
    targetCamX=-expandedNode.x*targetCamScale;
    targetCamY=-expandedNode.y*targetCamScale;
  } else {
    targetCamX=0;targetCamY=0;
    targetCamScale=W<768?0.55:0.8;
  }
  updateBreadcrumb();
}

function updateBreadcrumb(){
  var el=document.getElementById('breadcrumb');
  while(el.firstChild) el.removeChild(el.firstChild);
  // Root
  var root=document.createElement('span');
  root.className='bc-item'+(expandedNode?'':' active');
  root.textContent='COSMO';
  root.onclick=function(){expandedNode=null;drillStack=[];setVisibility();targetCamX=0;targetCamY=0;targetCamScale=W<768?0.55:0.8;updateBreadcrumb();};
  el.appendChild(root);
  // Stack + current
  var path=drillStack.filter(function(x){return x;}).concat(expandedNode?[expandedNode]:[]);
  path.forEach(function(n,i){
    var sep=document.createElement('span');sep.className='bc-sep';sep.textContent=' > ';el.appendChild(sep);
    var item=document.createElement('span');
    item.className='bc-item'+(i===path.length-1?' active':'');
    item.textContent=n.label;
    item.onclick=function(){
      // Navigate to this level
      var idx=drillStack.indexOf(n);
      if(idx>=0){drillStack=drillStack.slice(0,idx);expandedNode=n;}
      setVisibility();targetCamX=-n.x*targetCamScale;targetCamY=-n.y*targetCamScale;updateBreadcrumb();
    };
    el.appendChild(item);
  });
}

var currentView='full';
function applyViewFilter(){
  nodes.forEach(function(n){
    if(n.type==='sub' && (!expandedNode || n.parent!==expandedNode)){n.visible=false;return;}
    switch(currentView){
      case'full':break;
      case'sim':if(n.group!=='sim'&&n.type!=='service'&&n.type!=='sub')n.visible=false;break;
      case'sp':if(n.group!=='sp'&&n.group!=='supply'&&n.type!=='service'&&n.type!=='sub')n.visible=false;break;
      case'web':if(n.group!=='web'&&n.type!=='service'&&n.type!=='sub')n.visible=false;break;
      case'flow':if(n.type!=='service'&&n.type!=='resource'&&n.type!=='external')n.visible=false;break;
    }
  });
}

// Physics
function simulate(){
  for(var i=0;i<nodes.length;i++){
    var ni=nodes[i];if(!ni.visible||ni.dragging)continue;
    var fx=0,fy=0;
    fx-=ni.x*0.0008;fy-=ni.y*0.0008;
    for(var j=0;j<nodes.length;j++){
      if(i===j||!nodes[j].visible)continue;
      var nj=nodes[j],dx=ni.x-nj.x,dy=ni.y-nj.y,dist=Math.sqrt(dx*dx+dy*dy)+1;
      var force=500*(ni.r+nj.r)/(dist*dist);
      fx+=(dx/dist)*force;fy+=(dy/dist)*force;
    }
    fx+=(ni.ox-ni.x)*0.03;fy+=(ni.oy-ni.y)*0.03;
    ni.vx=(ni.vx+fx)*0.8;ni.vy=(ni.vy+fy)*0.8;ni.x+=ni.vx;ni.y+=ni.vy;
  }
}

var time=0,hoveredNode=null;
function hexRgba(hex,a){return'rgba('+parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16)+','+a+')';}

function draw(){
  time+=0.016;simulate();
  camX+=(targetCamX-camX)*0.1;camY+=(targetCamY-camY)*0.1;camScale+=(targetCamScale-camScale)*0.1;
  ctx.clearRect(0,0,W,H);
  // Particles
  ctx.save();
  for(var i=0;i<40;i++){
    var px=((i*137.5+time*5)%(W+100))-50,py=((i*97.3+time*2)%(H+100))-50;
    ctx.fillStyle='rgba(196,185,154,'+(0.02+Math.sin(time+i)*0.015)+')';ctx.fillRect(px,py,1.5,1.5);
  }
  ctx.restore();
  ctx.save();ctx.translate(W/2+camX,H/2+camY);ctx.scale(camScale,camScale);

  // Edges
  edges.forEach(function(e){
    if(!e.a.visible||!e.b.visible)return;
    var isHL=hoveredNode&&(e.a===hoveredNode||e.b===hoveredNode);
    var alpha=hoveredNode?(isHL?0.7:0.06):0.2;
    ctx.beginPath();ctx.moveTo(e.a.x,e.a.y);ctx.lineTo(e.b.x,e.b.y);
    ctx.strokeStyle=isHL?C.vermillion:hexRgba(C.bamboo,alpha);
    ctx.lineWidth=isHL?e.width+1:e.width;ctx.stroke();
    if(e.animated||isHL){
      var t1=(time*0.4)%1,ddx=e.b.x-e.a.x,ddy=e.b.y-e.a.y;
      ctx.beginPath();ctx.arc(e.a.x+ddx*t1,e.a.y+ddy*t1,3,0,Math.PI*2);ctx.fillStyle=C.vermillion;ctx.fill();
      var t2=(time*0.4+0.5)%1;ctx.beginPath();ctx.arc(e.a.x+ddx*t2,e.a.y+ddy*t2,2,0,Math.PI*2);ctx.fillStyle=hexRgba(C.vermillion,0.4);ctx.fill();
    }
    if(e.label&&(isHL||!hoveredNode)){ctx.font='9px "Noto Sans SC",sans-serif';ctx.fillStyle=isHL?C.vermillion:hexRgba(C.bamboo,0.5);ctx.textAlign='center';ctx.fillText(e.label,(e.a.x+e.b.x)/2,(e.a.y+e.b.y)/2-6);}
  });

  // Nodes
  nodes.forEach(function(n){
    if(!n.visible)return;
    var isHov=n===hoveredNode;
    var isConn=hoveredNode&&edges.some(function(e){return(e.a===hoveredNode&&e.b===n)||(e.b===hoveredNode&&e.a===n);});
    var dimmed=hoveredNode&&!isHov&&!isConn;var alpha=dimmed?0.12:1;
    var col=GCOL[n.group]||C.stone;
    var hasChildren=n.children&&n.children.length>0;

    // Glow
    if((isHov||n.type==='service')&&!dimmed){
      var grd=ctx.createRadialGradient(n.x,n.y,n.r*0.3,n.x,n.y,n.r*2.8);
      grd.addColorStop(0,hexRgba(col,0.2));grd.addColorStop(1,hexRgba(col,0));
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(n.x,n.y,n.r*2.8,0,Math.PI*2);ctx.fill();
    }
    // Circle
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=hexRgba(col,(n.type==='service'?0.12:n.type==='sub'?0.15:0.08)*alpha);ctx.fill();
    ctx.strokeStyle=hexRgba(col,(isHov?1:0.5)*alpha);
    ctx.lineWidth=n.type==='service'?2:(isHov?2:1);ctx.stroke();

    // Expandable indicator (dashed outer ring)
    if(hasChildren&&!dimmed&&n.type!=='service'){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+5,0,Math.PI*2);
      ctx.setLineDash([3,3]);ctx.strokeStyle=hexRgba(col,0.3);ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
    }

    // Service double ring + pulse
    if(n.type==='service'&&!dimmed){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+4,0,Math.PI*2);ctx.strokeStyle=hexRgba(col,0.2);ctx.lineWidth=1;ctx.stroke();
      var pulse=(Math.sin(time*1.8+n.id)+1)*0.5;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+8+pulse*8,0,Math.PI*2);ctx.strokeStyle=hexRgba(col,0.08*(1-pulse));ctx.lineWidth=1;ctx.stroke();
    }
    // Center dot
    ctx.beginPath();ctx.arc(n.x,n.y,n.type==='service'?4:n.type==='sub'?2:2.5,0,Math.PI*2);
    ctx.fillStyle=hexRgba(col,0.8*alpha);ctx.fill();
    // Label
    var fs=n.type==='service'?13:n.type==='sub'?9:10;
    ctx.font=(n.type==='service'?'700 ':'400 ')+fs+'px "Noto Sans SC",sans-serif';
    ctx.textAlign='center';ctx.fillStyle=hexRgba(C.ricePaper,(isHov?1:0.75)*alpha);
    ctx.fillText(n.label,n.x,n.y+n.r+12+(n.type==='sub'?-2:0));
    // Port
    if(n.type==='service'&&!dimmed){
      ctx.font='500 9px "Cormorant Garamond",serif';ctx.fillStyle=hexRgba(col,0.6);
      var pm=n.title.match(/Port \d+/);if(pm)ctx.fillText(pm[0],n.x,n.y+n.r+24);
    }
  });
  ctx.restore();
  requestAnimationFrame(draw);
}

// Interaction
var dragNode=null,isDragging=false,lastTouch=null,pinchDist=null;
function s2w(sx,sy){return{x:(sx-W/2-camX)/camScale,y:(sy-H/2-camY)/camScale};}
function findNode(sx,sy){
  var p=s2w(sx,sy),best=null,bestD=1e9;
  nodes.forEach(function(n){if(!n.visible)return;var d=Math.sqrt((n.x-p.x)*(n.x-p.x)+(n.y-p.y)*(n.y-p.y));if(d<n.r+12&&d<bestD){best=n;bestD=d;}});
  return best;
}
canvas.addEventListener('pointerdown',function(e){
  var n=findNode(e.clientX,e.clientY);
  if(n){dragNode=n;n.dragging=true;isDragging=false;}
  else{lastTouch={x:e.clientX,y:e.clientY};}
  document.getElementById('hint').style.opacity='0';
});
canvas.addEventListener('pointermove',function(e){
  if(dragNode){var p=s2w(e.clientX,e.clientY);dragNode.x=p.x;dragNode.y=p.y;isDragging=true;}
  else if(lastTouch){targetCamX+=e.clientX-lastTouch.x;targetCamY+=e.clientY-lastTouch.y;lastTouch={x:e.clientX,y:e.clientY};}
  else{hoveredNode=findNode(e.clientX,e.clientY);canvas.style.cursor=hoveredNode?'pointer':'default';}
});
canvas.addEventListener('pointerup',function(e){
  if(dragNode&&!isDragging){
    // Try drill down first, if no children show panel
    if(!drillInto(dragNode)){
      showPanel(dragNode);
    }
  } else if(!dragNode&&!isDragging&&lastTouch){
    // Clicked empty space - drill out
    var n=findNode(e.clientX,e.clientY);
    if(!n && expandedNode) drillOut();
  }
  if(dragNode)dragNode.dragging=false;
  dragNode=null;lastTouch=null;isDragging=false;
});
canvas.addEventListener('wheel',function(e){e.preventDefault();targetCamScale=Math.max(0.3,Math.min(3,targetCamScale*(e.deltaY>0?0.9:1.1)));},{passive:false});
canvas.addEventListener('touchstart',function(e){if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinchDist=Math.sqrt(dx*dx+dy*dy);}},{passive:true});
canvas.addEventListener('touchmove',function(e){if(e.touches.length===2&&pinchDist){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);targetCamScale=Math.max(0.3,Math.min(3,targetCamScale*d/pinchDist));pinchDist=d;}},{passive:true});
canvas.addEventListener('touchend',function(){pinchDist=null;});

function showPanel(n){
  document.getElementById('panel-type').textContent=n.type.toUpperCase()+' | '+n.group.toUpperCase();
  document.getElementById('panel-title').textContent=n.title;
  document.getElementById('panel-body').textContent=n.desc;
  var el=document.getElementById('panel-tags');while(el.firstChild)el.removeChild(el.firstChild);
  n.tags.forEach(function(t){var s=document.createElement('span');s.className='tag';s.textContent=t;el.appendChild(s);});
  document.getElementById('panel').classList.add('show');
}
function closePanel(){document.getElementById('panel').classList.remove('show');}

document.querySelectorAll('.view-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.view-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');currentView=btn.dataset.view;
    expandedNode=null;drillStack=[];setVisibility();updateBreadcrumb();
    targetCamX=0;targetCamY=0;
    if(currentView==='sim')targetCamY=80;if(currentView==='web')targetCamY=-80;
    targetCamScale=currentView==='full'?0.8:1;
  });
});

if(W<768){targetCamScale=0.55;camScale=0.55;}else{targetCamScale=0.8;camScale=0.8;}
setVisibility();updateBreadcrumb();draw();
</script>
</body>
</html>
