<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COSMO Architecture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:#e2e8f0;touch-action:none}
canvas{display:block}

.hud-top{position:fixed;top:0;left:0;right:0;padding:16px 20px;z-index:20;display:flex;justify-content:space-between;align-items:center;pointer-events:none}
.hud-top *{pointer-events:auto}
.logo{font-size:1.4rem;font-weight:800;letter-spacing:6px;background:linear-gradient(135deg,#00f0ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:0.55rem;color:#64748b;letter-spacing:3px;margin-top:2px}

.view-btns{display:flex;gap:6px}
.view-btn{padding:6px 14px;border-radius:16px;border:1px solid rgba(0,240,255,0.2);background:transparent;color:#64748b;font-size:0.7rem;cursor:pointer;transition:all 0.3s}
.view-btn.active,.view-btn:hover{background:rgba(0,240,255,0.1);border-color:#00f0ff;color:#00f0ff}

.panel{position:fixed;bottom:0;left:0;right:0;background:rgba(17,24,39,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(0,240,255,0.15);padding:20px;z-index:30;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);max-height:50vh;overflow-y:auto;border-radius:20px 20px 0 0}
.panel.show{transform:translateY(0)}
.panel-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);margin:0 auto 16px}
.panel h3{font-size:1.1rem;color:#00f0ff;margin-bottom:4px}
.panel .panel-type{font-size:0.7rem;color:#7c3aed;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.panel p{font-size:0.85rem;line-height:1.7;color:#94a3b8}
.panel .tags-area{margin-top:10px}
.panel .tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:0.65rem;margin:2px;background:rgba(0,240,255,0.1);color:#00f0ff;border:1px solid rgba(0,240,255,0.2)}
.panel-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer}

.hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:0.7rem;color:rgba(100,116,139,0.6);z-index:10;pointer-events:none;transition:opacity 0.5s}

.hud-stats{position:fixed;top:60px;right:20px;z-index:20;text-align:right;pointer-events:none}
.hud-stat{font-size:0.65rem;color:#64748b;margin-bottom:4px}
.hud-stat span{color:#00f0ff;font-weight:700;font-size:0.8rem}

.legend{position:fixed;bottom:20px;left:20px;z-index:20;pointer-events:none}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:0.65rem;color:#64748b}
.legend-dot{width:8px;height:8px;border-radius:50%}
</style>
</head>
<body>

<div class="hud-top">
  <div>
    <div class="logo">COSMO</div>
    <div class="logo-sub">Low Altitude Fulfillment Platform</div>
  </div>
  <div class="view-btns">
    <button class="view-btn active" data-view="full">Full</button>
    <button class="view-btn" data-view="sim">SIM</button>
    <button class="view-btn" data-view="sp">SP</button>
    <button class="view-btn" data-view="web">Web</button>
    <button class="view-btn" data-view="flow">Flow</button>
  </div>
</div>

<div class="hud-stats">
  <div class="hud-stat"><span>31</span> Modules</div>
  <div class="hud-stat"><span>7,283</span> Tests</div>
  <div class="hud-stat"><span>6</span> Layers</div>
  <div class="hud-stat"><span>3</span> Services</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div>SIM Engine</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00f0ff"></div>SP Platform</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Web Console</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Supply Resources</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>External</div>
</div>

<div class="hint" id="hint">Drag nodes / Pinch to zoom / Tap for details</div>

<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <button class="panel-close" onclick="closePanel()">x</button>
  <div class="panel-type" id="panel-type"></div>
  <h3 id="panel-title"></h3>
  <p id="panel-body"></p>
  <div class="tags-area" id="panel-tags"></div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

let camX = 0, camY = 0, camScale = 1;
let targetCamX = 0, targetCamY = 0, targetCamScale = 1;

const COLORS = {
  sim: '#7c3aed', sp: '#00f0ff', web: '#10b981', supply: '#f59e0b', external: '#ef4444'
};

const nodes = [];
const edges = [];

function N(label, group, x, y, r, type, title, desc, tags) {
  const n = { id: nodes.length, label, group, x, y, ox: x, oy: y, vx: 0, vy: 0, r, type, title: title||label, desc: desc||'', tags: tags||[], visible: true };
  nodes.push(n);
  return n;
}

function E(a, b, label, width, animated) {
  edges.push({ a, b, label: label||'', width: width||1, animated: !!animated });
}

// === DEFINE ARCHITECTURE ===
const sim = N('SIM Engine', 'sim', 0, -250, 40, 'service',
  'SIM Engine | Port 4010',
  '虚拟世界的因子状态源。管理仿真时钟、因子状态、行为策略、订单生成。不做业务决策，只提供状态查询和WebSocket通知。已完成配置化+阶段模型重写(Phase 0-7)。',
  ['Clock','Factor State','Behavior','Order Gen','Route','Config']);

const sp = N('SP Platform', 'sp', 0, 0, 50, 'service',
  'SP Platform | Port 4000 | Decision Hub',
  '系统的唯一决策中枢。六层编排(L1-L6)、渐进式锁定(软锁-硬锁-原子锁)、订单状态机、ETA管理。协调三类供给资源完成A-B-C三段配送。God Object已拆分(3039-423行,11模块)。',
  ['Order Engine','SKU Orch','Lock','ETA','Supply Registry','Dispatch','Bidding','Exception','Settlement','AI 26 Tools']);

const web = N('Web Console', 'web', 0, 250, 38, 'service',
  'Web Console | Port 3000 | Next.js',
  '控制塔视角前端。实时地图(DJI/Uber/DoorDash三模式)、仿真控制台(三态)、因子监控7卡片、订单详情七段进度、AI浮动面板。双层Polyline路线动画 rAF 60fps。',
  ['Map View','Sim Lab','Dashboard','Orders','Factor Monitor','AI Panel']);

// SIM sub-modules
const simClock = N('Clock Engine', 'sim', -200, -380, 18, 'module', 'Clock Engine | SIM', '仿真时钟管理，支持倍速控制(1x/2x/5x/10x)。驱动所有因子的时间轴推进，是仿真世界的心跳。已升级为7组独立计时序列。');
const simFactor = N('Factor State', 'sim', -60, -400, 18, 'module', 'Factor State Manager | SIM', '管理所有因子(无人机/骑手/VAS站点)的实时状态。提供状态查询API和WebSocket变化通知。GPS坐标、电池电量、任务状态实时更新。');
const simBehavior = N('Behavior', 'sim', 80, -400, 16, 'module', 'Behavior Strategy | SIM', '模拟无订单时因子的自发行为：无人机在VAS待命、骑手随机移动、站点空闲周期。加入随机事件(故障/天气/拒单)测试异常处理。');
const simOrder = N('Order Gen', 'sim', 200, -380, 16, 'module', 'Order Generator | SIM', '模拟外部订单平台，按配置生成测试订单。已验证2000单批量仿真。支持目标总量订单生成模式。');
const simRoute = N('Route Dist', 'sim', -160, -320, 14, 'module', 'Route Distance | SIM', '集成高德API计算真实路线距离和ETA。带缓存层避免重复调用。');
const simConfig = N('Config Reg', 'sim', 180, -320, 14, 'module', 'Config Registry | SIM', '5组配置集中管理：停留时间(D1-D13共17项)、速度参数、电池模型(5.3%/km)、天气因子、阶段序列。');

// SP sub-modules
const spOrder = N('Order Engine', 'sp', -280, -80, 20, 'module', 'Order Engine | SP', '订单全生命周期状态机。Hot/Cold双层持久化，业务订单永不丢失。7283测试全量通过。');
const spSKU = N('SKU Orch', 'sp', -280, 60, 16, 'module', 'SKU Orchestration | SP', '根据SKU配置组合A-B-C三段资源包。时间源一致性审计(240处扫描+30处修复)。');
const spLock = N('Prog Lock', 'sp', -180, 130, 16, 'module', 'Progressive Lock | SP', '三级锁定：软锁(状态触发)-硬锁(ETA触发)-原子锁(资源包锁定)。资源唯一ID审计(三阶段锁)。');
const spETA = N('ETA Track', 'sp', 280, -80, 18, 'module', 'ETA Tracking | SP', 'ETA计算和滚动更新。偏差预警，驱动C段骑手R4预派发。ETA驱动R规则改造。');
const spSupply = N('Supply Reg', 'sp', 280, 40, 18, 'module', 'Supply Registry | SP', '三类资源注册中心：VAS站点(直接)、OP无人机(直接)、骑手平台(平台级)。');
const spBid = N('Rider Bid', 'sp', 280, 130, 14, 'module', 'Rider Bidding | SP', '向骑手平台(闪送/达达/自建)广播需求，收集服务承诺，择优选择。SP不干预内部派单。');
const spAI = N('AI Assistant', 'sp', -80, 130, 14, 'module', 'LLM Assistant | SP', '26个AI工具集成。自然语言查询。CQRS读优化(4表+2视图+寄生写入+采样器)。');
const spExc = N('Exception', 'sp', 80, 130, 14, 'module', 'Exception Handler | SP', '异常分级：轻微-重试，中等-地面兜底，严重-取消+赔付。电池三层动态阈值。');

// Web sub-modules
const webMap = N('Map View', 'web', -200, 320, 18, 'module', 'Map View | Web', 'DJI/Uber/DoorDash三种地图模式。双层Polyline路线动画，rAF 60fps。实时GPS轨迹。');
const webSim = N('Sim Lab', 'web', -60, 340, 16, 'module', 'Sim Lab | Web', '仿真实验室。ConsoleShell三态(配置-运行-回顾)。配置态三步引导，因子监控7卡片+活动日志。');
const webDash = N('Dashboard', 'web', 80, 340, 16, 'module', 'Dashboard | Web', '数据看板。订单统计、实时因子状态、活动日志流。WorkspaceSwitcher。深色全适配。');
const webOrder = N('Orders', 'web', 200, 320, 16, 'module', 'Orders | Web', '订单详情。七段配送进度可视化(A1/A2/VAS-O/B/VAS-D/C1/C2)。段落映射统一。');

// Supply resources
const vas = N('VAS Station', 'supply', -350, 0, 22, 'resource', 'VAS Station | Direct Registration', '起降场。直接注册SP(站点/台位/人员)。资源包=起降台+能源+人员(原子组合)。飞行=托管权转移。', ['Time Slot','Resource Bundle','Cargo','Landing']);
const op = N('OP Operator', 'supply', 350, 0, 22, 'resource', 'OP Operator | Direct Registration', '无人机资产所有者。直接注册SP(运营商/机型/个体机)。物权OP，托管VAS，选机SP，放飞审批OP。', ['Drone Fleet','Flight Approve','Monitor']);
const rider = N('Rider Platform', 'supply', 0, 420, 20, 'resource', 'Rider Platform | Platform Registration', '地面运力。平台级注册(闪送/达达/自建)。SP广播-平台竞标-胜出者内部派单。SP不选个体骑手。', ['SF Express','Dada','In-house']);

// External
const merchant = N('Merchant', 'external', -350, -250, 16, 'external', 'Merchant | External', '商家/发货方。通过外部订单平台发起配送请求。');
const customer = N('Customer', 'external', 350, 250, 16, 'external', 'Customer | External', '收货方/消费者。C段骑手送达的最终目的地。');

// Edges
E(sim, sp, 'WebSocket + REST', 2.5, true);
E(sp, web, 'Next.js + WS', 2.5, true);
E(simClock, sim, '', 1); E(simFactor, sim, '', 1); E(simBehavior, sim, '', 1);
E(simOrder, sim, '', 1); E(simRoute, sim, '', 1); E(simConfig, sim, '', 1);
E(spOrder, sp, '', 1); E(spSKU, sp, '', 1); E(spLock, sp, '', 1);
E(spETA, sp, '', 1); E(spSupply, sp, '', 1); E(spBid, sp, '', 1);
E(spAI, sp, '', 1); E(spExc, sp, '', 1);
E(webMap, web, '', 1); E(webSim, web, '', 1); E(webDash, web, '', 1); E(webOrder, web, '', 1);
E(vas, sp, 'Direct Dispatch', 1.5, true); E(op, sp, 'Direct + Approve', 1.5, true); E(rider, sp, 'Broadcast Bid', 1.5, true);
E(merchant, sim, 'Orders', 1); E(customer, rider, 'Delivery', 1);
E(vas, op, 'Drone Custody', 1);

// Physics
function simulate() {
  const repulsion = 800, damping = 0.85;
  for (let i = 0; i < nodes.length; i++) {
    if (!nodes[i].visible || nodes[i].dragging) continue;
    let fx = 0, fy = 0;
    fx -= nodes[i].x * 0.001;
    fy -= nodes[i].y * 0.001;
    for (let j = 0; j < nodes.length; j++) {
      if (i === j || !nodes[j].visible) continue;
      const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy) + 1;
      const force = repulsion * (nodes[i].r + nodes[j].r) / (dist * dist);
      fx += (dx / dist) * force; fy += (dy / dist) * force;
    }
    fx += (nodes[i].ox - nodes[i].x) * 0.02;
    fy += (nodes[i].oy - nodes[i].y) * 0.02;
    nodes[i].vx = (nodes[i].vx + fx) * damping;
    nodes[i].vy = (nodes[i].vy + fy) * damping;
    nodes[i].x += nodes[i].vx;
    nodes[i].y += nodes[i].vy;
  }
}

let time = 0, hoveredNode = null;

function hexToRgba(hex, a) {
  return 'rgba(' + parseInt(hex.slice(1,3),16) + ',' + parseInt(hex.slice(3,5),16) + ',' + parseInt(hex.slice(5,7),16) + ',' + a + ')';
}

function draw() {
  time += 0.016;
  simulate();
  camX += (targetCamX - camX) * 0.1;
  camY += (targetCamY - camY) * 0.1;
  camScale += (targetCamScale - camScale) * 0.1;

  ctx.clearRect(0, 0, W, H);

  // BG particles
  ctx.save();
  for (let i = 0; i < 60; i++) {
    const px = ((i * 137.5 + time * 8) % (W + 100)) - 50;
    const py = ((i * 97.3 + time * 3) % (H + 100)) - 50;
    ctx.fillStyle = 'rgba(0,240,255,' + (0.03 + Math.sin(time + i) * 0.02) + ')';
    ctx.fillRect(px, py, 1, 1);
  }
  ctx.restore();

  ctx.save();
  ctx.translate(W/2 + camX, H/2 + camY);
  ctx.scale(camScale, camScale);

  // Edges
  edges.forEach(function(e) {
    if (!e.a.visible || !e.b.visible) return;
    var isHL = hoveredNode && (e.a === hoveredNode || e.b === hoveredNode);
    var alpha = hoveredNode ? (isHL ? 0.8 : 0.08) : 0.25;
    ctx.beginPath();
    ctx.moveTo(e.a.x, e.a.y); ctx.lineTo(e.b.x, e.b.y);
    ctx.strokeStyle = isHL ? '#00f0ff' : 'rgba(100,116,139,' + alpha + ')';
    ctx.lineWidth = isHL ? e.width + 1 : e.width;
    ctx.stroke();
    if (e.animated || isHL) {
      var t = (time * 0.5) % 1;
      var dx = e.b.x - e.a.x, dy = e.b.y - e.a.y;
      ctx.beginPath(); ctx.arc(e.a.x + dx*t, e.a.y + dy*t, 3, 0, Math.PI*2);
      ctx.fillStyle = '#00f0ff'; ctx.fill();
      var t2 = (time * 0.5 + 0.5) % 1;
      ctx.beginPath(); ctx.arc(e.a.x + dx*t2, e.a.y + dy*t2, 2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,240,255,0.5)'; ctx.fill();
    }
    if (e.label && (isHL || !hoveredNode)) {
      ctx.font = '9px -apple-system, sans-serif';
      ctx.fillStyle = isHL ? '#00f0ff' : 'rgba(100,116,139,0.5)';
      ctx.textAlign = 'center';
      ctx.fillText(e.label, (e.a.x+e.b.x)/2, (e.a.y+e.b.y)/2 - 6);
    }
  });

  // Nodes
  nodes.forEach(function(n) {
    if (!n.visible) return;
    var isHovered = n === hoveredNode;
    var isConn = hoveredNode && edges.some(function(e){ return (e.a===hoveredNode&&e.b===n)||(e.b===hoveredNode&&e.a===n); });
    var dimmed = hoveredNode && !isHovered && !isConn;
    var alpha = dimmed ? 0.15 : 1;
    var col = COLORS[n.group] || '#64748b';

    if ((isHovered || n.type === 'service') && !dimmed) {
      var grd = ctx.createRadialGradient(n.x, n.y, n.r*0.5, n.x, n.y, n.r*2.5);
      grd.addColorStop(0, col + '40'); grd.addColorStop(1, col + '00');
      ctx.fillStyle = grd;
      ctx.fillRect(n.x - n.r*2.5, n.y - n.r*2.5, n.r*5, n.r*5);
    }

    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
    ctx.fillStyle = hexToRgba(col, 0.15 * alpha); ctx.fill();
    ctx.strokeStyle = hexToRgba(col, (isHovered ? 1 : 0.6) * alpha);
    ctx.lineWidth = isHovered ? 2.5 : 1.5; ctx.stroke();

    if (n.type === 'service' && !dimmed) {
      var pulse = (Math.sin(time*2+n.id)+1)*0.5;
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r+4+pulse*6, 0, Math.PI*2);
      ctx.strokeStyle = hexToRgba(col, 0.15*(1-pulse)); ctx.lineWidth = 1; ctx.stroke();
    }

    ctx.beginPath(); ctx.arc(n.x, n.y, 3, 0, Math.PI*2);
    ctx.fillStyle = hexToRgba(col, 0.8*alpha); ctx.fill();

    ctx.font = (n.type==='service'?'600 13':'500 10') + 'px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = hexToRgba('#e2e8f0', (isHovered?1:0.8)*alpha);
    ctx.fillText(n.label, n.x, n.y + n.r + 14);

    if (n.type === 'service' && !dimmed) {
      ctx.font = '500 9px -apple-system, sans-serif';
      ctx.fillStyle = hexToRgba(col, 0.6);
      var pm = n.title.match(/Port \d+/);
      if (pm) ctx.fillText(pm[0], n.x, n.y + n.r + 26);
    }
  });

  ctx.restore();
  requestAnimationFrame(draw);
}

// Interaction
var dragNode = null, isDragging = false, lastTouch = null, pinchDist = null;

function screenToWorld(sx, sy) {
  return { x: (sx - W/2 - camX) / camScale, y: (sy - H/2 - camY) / camScale };
}

function findNode(sx, sy) {
  var p = screenToWorld(sx, sy), best = null, bestD = Infinity;
  nodes.forEach(function(n) {
    if (!n.visible) return;
    var d = Math.sqrt((n.x-p.x)*(n.x-p.x) + (n.y-p.y)*(n.y-p.y));
    if (d < n.r + 10 && d < bestD) { best = n; bestD = d; }
  });
  return best;
}

canvas.addEventListener('pointerdown', function(e) {
  var n = findNode(e.clientX, e.clientY);
  if (n) { dragNode = n; n.dragging = true; isDragging = false; }
  else { lastTouch = { x: e.clientX, y: e.clientY }; }
  document.getElementById('hint').style.opacity = '0';
});

canvas.addEventListener('pointermove', function(e) {
  if (dragNode) {
    var p = screenToWorld(e.clientX, e.clientY);
    dragNode.x = p.x; dragNode.y = p.y; isDragging = true;
  } else if (lastTouch) {
    targetCamX += e.clientX - lastTouch.x;
    targetCamY += e.clientY - lastTouch.y;
    lastTouch = { x: e.clientX, y: e.clientY };
  } else {
    hoveredNode = findNode(e.clientX, e.clientY);
    canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
  }
});

canvas.addEventListener('pointerup', function(e) {
  if (dragNode && !isDragging) showPanel(dragNode);
  if (dragNode) dragNode.dragging = false;
  dragNode = null; lastTouch = null;
});

canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  targetCamScale = Math.max(0.3, Math.min(3, targetCamScale * (e.deltaY > 0 ? 0.9 : 1.1)));
}, { passive: false });

canvas.addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: true });

canvas.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2 && pinchDist) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    var dist = Math.sqrt(dx*dx + dy*dy);
    targetCamScale = Math.max(0.3, Math.min(3, targetCamScale * dist / pinchDist));
    pinchDist = dist;
  }
}, { passive: true });

canvas.addEventListener('touchend', function() { pinchDist = null; });

// Panel
function showPanel(n) {
  document.getElementById('panel-type').textContent = n.type.toUpperCase() + ' | ' + n.group.toUpperCase();
  document.getElementById('panel-title').textContent = n.title;
  document.getElementById('panel-body').textContent = n.desc;
  var tagsEl = document.getElementById('panel-tags');
  // Clear existing tags safely
  while (tagsEl.firstChild) tagsEl.removeChild(tagsEl.firstChild);
  n.tags.forEach(function(t) {
    var span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    tagsEl.appendChild(span);
  });
  document.getElementById('panel').classList.add('show');
}

function closePanel() {
  document.getElementById('panel').classList.remove('show');
}

// View switching
document.querySelectorAll('.view-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.view-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    var v = btn.dataset.view;
    nodes.forEach(function(n) {
      switch(v) {
        case 'full': n.visible = true; break;
        case 'sim': n.visible = n.group==='sim' || n.type==='service'; break;
        case 'sp': n.visible = n.group==='sp' || n.group==='supply' || n.type==='service'; break;
        case 'web': n.visible = n.group==='web' || n.type==='service'; break;
        case 'flow': n.visible = n.type==='service' || n.type==='resource' || n.type==='external'; break;
      }
    });
    targetCamX = 0; targetCamY = 0;
    if (v==='sim') targetCamY = 100;
    if (v==='web') targetCamY = -100;
    targetCamScale = v==='full' ? 0.85 : 1;
  });
});

// Init zoom
if (W < 768) { targetCamScale = 0.6; camScale = 0.6; }
else { targetCamScale = 0.85; camScale = 0.85; }

draw();
</script>
